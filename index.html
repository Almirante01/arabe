<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arabic Dev Learning</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Noto+Naskh+Arabic&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Palette optimizada para legibilidad (WCAG compliant) */
            --color-fatha: #ff3e3e;
            --color-damma: #2ecc71;
            --color-kasra: #3498db;
            --color-shadda: #f1c40f;
            --color-sukun: #95a5a6;
            --color-tanwin: #9b59b6;
            --color-base: #1a1a1a;
        }

        body {
            background: #fcfcfc;
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0; padding: 20px;
            direction: ltr; /* UI en LTR */
        }

        .dashboard {
            max-width: 1100px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .word-card {
            background: #fff;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            text-align: center;
            border: 1px solid #eee;
        }

        /* COMPONENTE CORE: Renderizado Árabe */
        .arabic-display {
            font-family: 'Amiri', serif;
            font-size: 5rem;
            color: var(--color-base);
            direction: rtl;
            line-height: 1.6;
            margin-bottom: 10px;
            /* Evita que el span rompa la palabra en algunos motores */
            display: inline-block;
            unicode-bidi: bidi-override;
        }

        /* Clases de Harakat con inyección de color forzada */
        .h-fatha  { color: var(--color-fatha) !important;  display: inline; }
        .h-damma  { color: var(--color-damma) !important;  display: inline; }
        .h-kasra  { color: var(--color-kasra) !important;  display: inline; }
        .h-shadda { color: var(--color-shadda) !important; display: inline; }
        .h-sukun  { color: var(--color-sukun) !important;  display: inline; }
        .h-tanwin { color: var(--color-tanwin) !important; display: inline; }

        .translation {
            color: #666;
            font-size: 1.2rem;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="dashboard" id="mainGrid">
        </div>

<script>
    /**
     * Mapeo de caracteres Unicode Árabes a Clases CSS
     * Se procesan como entidades independientes para evitar colisiones de renderizado.
     */
    const HARAKAT_MAP = {
        '\u064E': 'h-fatha',
        '\u064F': 'h-damma',
        '\u0650': 'h-kasra',
        '\u0651': 'h-shadda',
        '\u0652': 'h-sukun',
        '\u064B': 'h-tanwin',
        '\u064C': 'h-tanwin',
        '\u064D': 'h-tanwin'
    };

    /**
     * Parser: Transforma el string árabe plano en HTML enriquecido.
     * Implementa una lógica de reemplazo basada en literales de caracteres.
     */
    function parseArabicText(rawText) {
        let result = "";
        for (const char of rawText) {
            if (HARAKAT_MAP[char]) {
                result += `<span class="${HARAKAT_MAP[char]}">${char}</span>`;
            } else {
                result += char;
            }
        }
        return result;
    }

    /**
     * Data Fetcher (Simulación de carga de archivos JSON)
     */
    async function initApp() {
        const grid = document.getElementById('mainGrid');
        
        // Simulación de los archivos que tienes en la carpeta /data/
        // En producción usa: const response = await fetch('./data/animales.json');
        const mockData = [
            { arabe: "كِتَابٌ", trad: "Libro" },
            { arabe: "قِطَّةٌ", trad: "Gato" },
            { arabe: "مُدَرِّسٌ", trad: "Profesor" }
        ];

        grid.innerHTML = mockData.map(item => `
            <div class="word-card">
                <div class="arabic-display">${parseArabicText(item.arabe)}</div>
                <div class="translation">${item.trad}</div>
            </div>
        `).join('');
    }

    document.addEventListener('DOMContentLoaded', initApp);
</script>
</body>
</html>
