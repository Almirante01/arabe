<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Arabic Learning Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&display=swap" rel="stylesheet">
    <style>
        :root {
            --fatha: #ff4d4d;
            --damma: #2ecc71;
            --kasra: #3498db;
            --shadda: #f1c40f;
            --sukun: #95a5a6;
        }

        body { background: #f0f2f5; font-family: sans-serif; display: flex; justify-content: center; padding: 50px; }

        .word-container {
            position: relative;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        /* La clave: Dos capas idénticas */
        .arabic-layer {
            font-family: 'Amiri', serif;
            font-size: 8rem;
            direction: rtl;
            line-height: 1.2;
            white-space: nowrap;
        }

        /* Capa 1: Letras Base (Negras) */
        .base-text {
            color: #000;
            position: relative;
            z-index: 1;
        }

        /* Capa 2: Harakat (Colores) */
        /* Usamos un mix-blend-mode o simplemente superposición con transparencia */
        .harakat-overlay {
            position: absolute;
            top: 40px; /* Debe coincidir con el padding del container */
            left: 40px;
            right: 40px;
            z-index: 2;
            pointer-events: none; /* No interfiere con el mouse */
        }

        /* Colores específicos para los caracteres */
        .h-fatha  { color: var(--fatha); }
        .h-damma  { color: var(--damma); }
        .h-kasra  { color: var(--kasra); }
        .h-shadda { color: var(--shadda); }
        .h-sukun  { color: var(--sukun); }

        /* Escondemos las letras en la capa de arriba pero dejamos los harakat */
        .transparent-letter { color: transparent; }

    </style>
</head>
<body>

    <div id="root"></div>

<script>
    const HARAKAT_MAP = {
        '\u064E': 'h-fatha',  '\u064F': 'h-damma',
        '\u0650': 'h-kasra',  '\u0651': 'h-shadda',
        '\u0652': 'h-sukun',  '\u064B': 'h-fatha', // Tanwin igual que fatha por simplicidad
        '\u064C': 'h-damma',  '\u064D': 'h-kasra'
    };

    function renderWord(rawText, translation) {
        // Generamos la capa de harakat manteniendo las letras transparentes
        let harakatHTML = "";
        for (const char of rawText) {
            if (HARAKAT_MAP[char]) {
                harakatHTML += `<span class="${HARAKAT_MAP[char]}">${char}</span>`;
            } else {
                harakatHTML += `<span class="transparent-letter">${char}</span>`;
            }
        }

        return `
            <div class="word-container">
                <div class="arabic-layer base-text">${rawText}</div>
                <div class="arabic-layer harakat-overlay">${harakatHTML}</div>
                <h2 style="color:#555; margin-top:20px;">${translation}</h2>
            </div>
        `;
    }

    // Datos de prueba
    const data = [
        { arabe: "كِتَابٌ", trad: "Libro" },
        { arabe: "قِطَّةٌ", trad: "Gato" }
    ];

    document.getElementById('root').innerHTML = data.map(i => renderWord(i.arabe, i.trad)).join('');
</script>
</body>
</html>
