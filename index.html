<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Árabe PRO</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="overlay">

<h1>عربي ذكي</h1>

<!-- MENÚ -->
<div class="menu">
<button onclick="showSection('vocab')">📚 Vocabulario</button>
<button onclick="showSection('game')">🎮 Juego</button>
<button onclick="showSection('conversation')">🧠 Conversación</button>
</div>

<!-- VOCABULARIO -->
<div id="vocab" class="section">
<h2>Vocabulario</h2>
<div id="list"></div>
</div>

<!-- JUEGO -->
<div id="game" class="section" style="display:none;">
<h2>Construye la frase</h2>
<div id="gameWords"></div>
<p id="userSentence"></p>
<button onclick="checkGame()">Comprobar</button>
<p id="gameResult"></p>
</div>

<!-- CONVERSACIÓN -->
<div id="conversation" class="section" style="display:none;">
<h2>Modo conversación</h2>
<p id="question"></p>
<input id="answer" placeholder="Escribe en árabe">
<button onclick="checkAnswer()">Responder</button>
<p id="feedback"></p>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
