<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Árabe Pro - Harakat a Color</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Noto+Naskh+Arabic&display=swap" rel="stylesheet">
    <style>
        :root {
            --fatha: #ff0000;  --damma: #008000; --kasra: #0000ff;
            --shadda: #ff8c00; --sukun: #808080; --tanwin: #800080;
        }

        body { background: #fdfdfd; font-family: sans-serif; }
        .container { max-width: 1000px; margin: 50px auto; text-align: center; }
        
        /* Estilo de la Palabra */
        .palabra-arabe {
            font-family: 'Amiri', serif; /* Amiri separa mejor los spans de color */
            font-size: 6rem;
            direction: rtl;
            unicode-bidi: isolate;
            color: #000; /* Letras siempre negras */
            line-height: 1.5;
        }

        /* Forzado de Color para Harakat */
        /* Usamos display: inline para que no se separe de la letra */
        .h-fatha  { color: var(--fatha) !important;  -webkit-text-fill-color: var(--fatha); }
        .h-damma  { color: var(--damma) !important;  -webkit-text-fill-color: var(--damma); }
        .h-kasra  { color: var(--kasra) !important;  -webkit-text-fill-color: var(--kasra); }
        .h-shadda { color: var(--shadda) !important; -webkit-text-fill-color: var(--shadda); }
        .h-sukun  { color: var(--sukun) !important;  -webkit-text-fill-color: var(--sukun); }
        .h-tanwin { color: var(--tanwin) !important; -webkit-text-fill-color: var(--tanwin); }

        .card {
            background: white; border: 1px solid #eee; padding: 20px;
            border-radius: 12px; display: inline-block; min-width: 250px;
        }
        
        .trad { font-size: 1.5rem; color: #444; margin-top: 10px; }
        select { padding: 10px; font-size: 1rem; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <select id="cat" onchange="load(this.value)">
        <option value="">Selecciona Categoría</option>
        <option value="animales">Animales</option>
        <option value="sustantivos">Sustantivos</option>
    </select>

    <div id="grid"></div>
</div>

<script>
    const rules = [
        { char: '\u064E', cls: 'h-fatha' },  { char: '\u064F', cls: 'h-damma' },
        { char: '\u0650', cls: 'h-kasra' },  { char: '\u0651', cls: 'h-shadda' },
        { char: '\u0652', cls: 'h-sukun' },  { char: '\u064B', cls: 'h-tanwin' },
        { char: '\u064C', cls: 'h-tanwin' }, { char: '\u064D', cls: 'h-tanwin' }
    ];

    function colorize(txt) {
        let res = txt;
        rules.forEach(r => {
            // El truco es envolver el signo en un span y asegurar que no haya espacios
            const regex = new RegExp(r.char, 'g');
            res = res.replace(regex, `<span class="${r.cls}">${r.char}</span>`);
        });
        return res;
    }

    async function load(cat) {
        if(!cat) return;
        try {
            const res = await fetch(`./data/${cat}.json`);
            const data = await res.json();
            document.getElementById('grid').innerHTML = data.items.map(i => `
                <div class="card">
                    <div class="palabra-arabe">${colorize(i.arabe)}</div>
                    <div class="trad">${i.traduccion}</div>
                </div>
            `).join('');
        } catch(e) {
            alert("Error: Para probarlo localmente necesitas un 'Live Server'. En GitHub funcionará directo.");
        }
    }
</script>
</body>
</html>
